<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandMitra | Contact</title>
    <link rel="icon" type="png" href="img/favicon.png">
    <link href="./src/output.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body
    class="bg-gray-900 text-white font-sans min-h-screen flex flex-col pt-20 selection:bg-pink-500 selection:text-white">

    <nav
        class="fixed w-full z-50 top-0 bg-gray-900/80 backdrop-blur-md border-b border-gray-800 transition-all shadow-lg">
        <div class="max-w-7xl mx-auto px-5 py-5 flex items-center justify-between">
            <a href="index.html"
                class="text-3xl font-extrabold bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 bg-clip-text text-transparent tracking-wide hover:scale-105 transition-transform z-50">
                BandMitra
            </a>

            <div class="hidden md:flex space-x-8 text-gray-300 font-medium items-center">
                <a href="index.html" class="hover:text-pink-400 transition-colors duration-300">Home</a>
                <a href="About.html" class="hover:text-pink-400 transition-colors duration-300">About</a>
                <a href="Bands.html" class="hover:text-pink-400 transition-colors duration-300">Bands</a>
                <a href="Register.html" class="hover:text-pink-400 transition-colors duration-300">Register</a>
                <a href="Contact.html" class="text-white font-bold border-b-2 border-pink-500 pb-1">Contact</a>
            </div>

            <button id="mobile-menu-btn"
                class="md:hidden text-gray-300 hover:text-white focus:outline-none z-50 active:scale-90 transition-transform">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>

        <div id="mobile-menu"
            class="hidden md:hidden bg-gray-900 border-b border-gray-800 shadow-xl absolute w-full left-0 top-full">
            <div class="flex flex-col px-6 py-6 space-y-4 text-gray-300 font-medium text-center">
                <a href="index.html" class="hover:text-pink-400 transition-colors block">Home</a>
                <a href="About.html" class="hover:text-pink-400 transition-colors block">About</a>
                <a href="Bands.html" class="hover:text-pink-400 transition-colors block">Bands</a>
                <a href="Register.html" class="hover:text-pink-400 transition-colors block">Register</a>
                <a href="Contact.html"
                    class="text-white font-bold border-b-2 border-pink-500 pb-1 inline-block mx-auto">Contact</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex flex-col md:flex-row items-center justify-center p-6 gap-12 max-w-6xl mx-auto w-full">
        <div class="w-full md:w-1/2 text-left">
            <h1
                class="text-5xl font-bold mb-6 bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
                Get in Touch</h1>
            <p class="text-xl text-gray-400 mb-8">Have a question about booking a band or registering your own? Drop us
                a message and our team will get back to you shortly.</p>

            <div class="space-y-4 text-gray-300">
                <p class="flex items-center gap-4 hover:text-orange-400 transition-colors cursor-pointer">
                    <span
                        class="p-3 bg-gray-800 rounded-full border border-gray-700 flex items-center justify-center text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                            <path
                                d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                            <path
                                d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
                        </svg>
                    </span>
                    vishwakarmaranjit8109@gmail.com
                </p>
                <p class="flex items-center gap-4 hover:text-orange-400 transition-colors cursor-pointer"><span
                        class="p-3 bg-gray-800 rounded-full border border-gray-700">📞</span> +91 95192 28002</p>
            </div>
        </div>

        <div class="w-full md:w-1/2 bg-gray-800/50 p-8 rounded-3xl border border-gray-700 backdrop-blur-sm">
            <form id="contactForm" class="space-y-5">
                <div>
                    <input type="text" id="contactName" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all"
                        placeholder="Your Name">
                </div>
                <div>
                    <input type="email" id="contactEmail" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all"
                        placeholder="Your Email">
                </div>
                <div>
                    <textarea id="contactMessage" rows="5" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all resize-none"
                        placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit"
                    class="w-full py-4 rounded-xl bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold text-lg hover:shadow-lg hover:shadow-orange-500/30 hover:-translate-y-1 active:scale-95 transition-all duration-300">
                    Send Message
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
