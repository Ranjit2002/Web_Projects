<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandMitra | Register Band</title>
    <link rel="icon" type="png" href="img/favicon.png">
    <link href="./src/output.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body
    class="bg-gray-900 text-white font-sans min-h-screen flex flex-col pt-20 selection:bg-pink-500 selection:text-white">

    <nav
        class="fixed w-full z-50 top-0 bg-gray-900/80 backdrop-blur-md border-b border-gray-800 transition-all shadow-lg">
        <div class="max-w-7xl mx-auto px-5 py-5 flex items-center justify-between">
            <a href="index.html"
                class="text-3xl font-extrabold bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 bg-clip-text text-transparent tracking-wide hover:scale-105 transition-transform z-50">
                BandMitra
            </a>

            <div class="hidden md:flex space-x-8 text-gray-300 font-medium items-center">
                <a href="index.html" class="hover:text-pink-400 transition-colors duration-300">Home</a>
                <a href="About.html" class="hover:text-pink-400 transition-colors duration-300">About</a>
                <a href="Bands.html" class="hover:text-pink-400 transition-colors duration-300">Bands</a>
                <a href="Register.html" class="text-white font-bold border-b-2 border-pink-500 pb-1">Register</a>
                <a href="Contact.html" class="hover:text-pink-400 transition-colors duration-300">Contact</a>
            </div>

            <button id="mobile-menu-btn"
                class="md:hidden text-gray-300 hover:text-white focus:outline-none z-50 active:scale-90 transition-transform">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>

        <div id="mobile-menu"
            class="hidden md:hidden bg-gray-900 border-b border-gray-800 shadow-xl absolute w-full left-0 top-full">
            <div class="flex flex-col px-6 py-6 space-y-4 text-gray-300 font-medium text-center">
                <a href="index.html" class="hover:text-pink-400 transition-colors block">Home</a>
                <a href="About.html" class="hover:text-pink-400 transition-colors block">About</a>
                <a href="Bands.html" class="hover:text-pink-400 transition-colors block">Bands</a>
                <a href="Register.html"
                    class="text-white font-bold border-b-2 border-pink-500 pb-1 inline-block mx-auto">Register</a>
                <a href="Contact.html" class="hover:text-pink-400 transition-colors block">Contact</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center p-6">
        <div
            class="w-full max-w-md bg-gray-800 p-8 rounded-3xl shadow-2xl relative overflow-hidden border border-gray-700">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-500 to-pink-500"></div>

            <h2 class="text-3xl font-bold mb-2 text-center">List Your Band</h2>
            <p class="text-gray-400 text-center mb-8">Join BandMitra and start getting booked.</p>

            <form id="registerForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Band Name</label>
                    <input type="text" id="bandName" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
                        placeholder="e.g. The Midnight Echoes">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Price per Event ($)</label>
                    <input type="number" id="bandPrice" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        placeholder="e.g. 500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Location / City</label>
                    <input type="text" id="bandLocation" required
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="e.g. Austin, TX">
                </div>

                <button type="submit"
                    class="w-full py-4 rounded-xl bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold text-lg hover:shadow-lg hover:shadow-pink-500/30 hover:-translate-y-1 active:scale-95 transition-all duration-300">
                    Register Band
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
