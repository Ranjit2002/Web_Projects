<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Converter</title>
    <link href="./src/output.css" rel="stylesheet">
    <style>
        @keyframes popIn {
            0% {
                transform: scale(0.95);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }
    </style>
</head>

<body
    class="bg-[#0f172a] min-h-screen flex items-center justify-center p-4 md:p-8 font-sans text-slate-200 overflow-x-hidden">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/20 rounded-full blur-[120px] pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-pink-500/20 rounded-full blur-[120px] pointer-events-none">
    </div>

    <main
        class="relative bg-white/10 backdrop-blur-xl border border-white/20 w-full max-w-md p-8 rounded-3xl shadow-2xl z-10 transition-all duration-300 hover:shadow-indigo-500/10">

        <header class="text-center mb-8">
            <h1
                class="text-4xl font-extrabold bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-500 bg-clip-text text-transparent pb-2 leading-tight">
                Currency Converter
            </h1>
            <p class="text-slate-400 text-sm mt-1">Live exchange rates at your fingertips</p>
        </header>

        <form id="converter-form" class="space-y-6">
            <div class="space-y-2">
                <label for="amount" class="text-sm font-medium text-slate-300">Amount</label>
                <input type="number" id="amount" value="1" min="0.01" step="0.01" required
                    class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-300 hover:border-purple-400/50">
            </div>

            <div class="grid grid-cols-[1fr,auto,1fr] gap-4 items-end">
                <div class="space-y-2">
                    <label for="from-currency" class="text-sm font-medium text-slate-300">From</label>
                    <select id="from-currency"
                        class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300 hover:border-purple-400/50 cursor-pointer text-sm">
                    </select>
                </div>

                <button type="button" id="swap-btn"
                    class="p-3 bg-slate-700/50 rounded-xl border border-slate-600 hover:bg-purple-500/20 hover:border-purple-500/50 hover:text-purple-400 transition-all duration-300 group"
                    aria-label="Swap currencies">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-6 w-6 transform group-hover:rotate-180 transition-transform duration-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                </button>

                <div class="space-y-2">
                    <label for="to-currency" class="text-sm font-medium text-slate-300">To</label>
                    <select id="to-currency"
                        class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300 hover:border-purple-400/50 cursor-pointer text-sm">
                    </select>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-500/30 hover:shadow-purple-500/50 hover:scale-[1.02] active:scale-95 transition-all duration-300">
                Convert
            </button>
        </form>

        <div id="result-container" class="mt-8 text-center hidden">
            <p class="text-slate-400 text-sm mb-1" id="conversion-text">1 USD = </p>
            <h2 class="text-3xl md:text-4xl font-bold text-white tracking-wide" id="final-result">
                0.00
            </h2>
            <p
                class="text-purple-400 text-xs mt-3 bg-purple-400/10 inline-block px-3 py-1 rounded-full border border-purple-400/20">
                Live rates updated automatically
            </p>
        </div>

        <div id="loading-state" class="mt-8 text-center hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-500 mx-auto"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
